<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Presupuesto</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background:#f4f1fa;
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.card{
    background:white;
    width:700px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#5e17eb;
}

.producto{
    background:#faf8ff;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    border:1px solid #eee;
}

label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:5px;
    color:#5e17eb;
}

select,input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:15px;
    font-size:14px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.agregar{
    background:#7209b7;
    color:white;
    width:100%;
    margin-bottom:20px;
}

.generar{
    background:#5e17eb;
    color:white;
}

.resetear{
    background:#f72585;
    color:white;
}

.copiar{
    background:black;
    color:white;
    width:100%;
    margin-top:15px;
}

.botones{
    display:flex;
    gap:10px;
    margin-top:10px;
}

textarea{
    width:100%;
    height:260px;
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:13px;
    background:#fcfcfc;
}

</style>
</head>

<body>

<div class="card">
<h2>Generador de Presupuesto</h2>

<div id="productos"></div>

<button class="agregar" onclick="agregarProducto()">+ Agregar Producto</button>

<label>Envío</label>
<select id="envio">
<option value="No">No</option>
<option value="Si">Si</option>
</select>

<label>Fecha de entrega</label>
<input type="date" id="fechaEntrega">

<div class="botones">
<button class="generar" onclick="generar()">Generar</button>
<button class="resetear" onclick="resetear()">Resetear</button>
</div>

<button class="copiar" onclick="copiar()">Copiar Resumen</button>

<textarea id="resultado" readonly></textarea>

</div>

<script>

const precios = {
"30X30 ASAS":{50:28000,100:52000,200:99000,300:147000,400:194000,500:242000},
"30X40 ASAS":{50:30000,100:48000,200:93000,300:128000,400:168000,500:208000},
"45X40 ASAS":{50:33000,100:56000,200:112000,300:158000,400:209000,500:260000},
"50X40 ASAS":{50:36000,100:65000,200:125000,300:185000,400:240000,500:290000},
"60X40 ASAS":{50:41000,100:77000,200:149000,300:221000,400:293000,500:365000},
"15X20 RIÑÓN":{50:24000,100:40000,200:60000,300:80000,400:110000,500:130000},
"20X30 RIÑÓN":{50:27000,100:42000,200:71000,300:100000,400:133000,500:167000},
"30X40 RIÑÓN":{50:32000,100:50000,200:84000,300:119000,400:159000,500:198000},
"20X25 BOX":{50:37000,100:58000,200:90000,300:123000,400:155000,500:188000},
"30X30 BOX":{50:39000,100:62000,200:99000,300:136000,400:173000,500:210000},
"30X40 BOX":{50:41000,100:66000,200:107000,300:147000,400:188000,500:228000},
"40X50 BOX":{50:45000,100:75000,200:124000,300:174000,400:223000,500:272000}
};

function agregarProducto(){

let html = `
<div class="producto">

<label>Tamaño</label>
<select class="tamaño">
<option value="">Seleccionar</option>
${Object.keys(precios).map(t=>`<option value="${t}">${t}</option>`).join("")}
</select>

<label>Cantidad</label>
<select class="cantidad">
<option value="">Seleccionar</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="200">200</option>
<option value="300">300</option>
<option value="400">400</option>
<option value="500">500</option>
</select>

<label>Doble estampa</label>
<select class="doble">
<option value="No">No</option>
<option value="Si">Si</option>
</select>

<label>Color de bolsa</label>
<input type="text" class="colorBolsa">

<label>Color de estampa</label>
<input type="text" class="colorEstampa">

</div>
`;

document.getElementById("productos").insertAdjacentHTML("beforeend", html);
}

agregarProducto();

function generar(){

let productos = document.querySelectorAll(".producto");
let totalGeneral = 0;
let textoPedidos = "";

productos.forEach((prod,index)=>{

let tamaño = prod.querySelector(".tamaño").value;
let cantidad = prod.querySelector(".cantidad").value;
let doble = prod.querySelector(".doble").value;
let colorBolsa = prod.querySelector(".colorBolsa").value;
let colorEstampa = prod.querySelector(".colorEstampa").value;

if(tamaño && cantidad){

let total = precios[tamaño][cantidad];

if(doble==="Si"){
total*=1.5;
}

totalGeneral += total;

textoPedidos += `${index+1}) ${cantidad}u - ${tamaño.replace(" ASAS","").replace(" RIÑÓN","").replace(" BOX","")} - Bolsa: ${colorBolsa} - Estampa: ${colorEstampa} - Doble Estampa: ${doble}\n`;

}

});

let envio = document.getElementById("envio").value;
if(envio==="Si"){
totalGeneral+=8000;
}

let fechaInput = document.getElementById("fechaEntrega").value;
let fechaFormateada = "A definir";

if(fechaInput){
    let fechaObj = new Date(fechaInput + "T00:00:00");
    let dia = fechaObj.getDate();
    let mes = fechaObj.toLocaleString("es-AR", { month: "long" });
    mes = mes.charAt(0).toUpperCase() + mes.slice(1);
    fechaFormateada = `${dia} de ${mes}`;
}


let seña = totalGeneral/2;
let restante = totalGeneral/2;

let resumen =
`PEDIDOS:
${textoPedidos}
${envio==="Si" ? "Envío: Si (+$8.000)\n" : "Envío: No\n"}
Fecha de entrega: ${fechaFormateada}

TOTAL GENERAL: $${totalGeneral.toLocaleString("es-AR")}
SEÑA: $${seña.toLocaleString("es-AR")}
RESTARÍAN: $${restante.toLocaleString("es-AR")}

📢 Datos para Transferencia Bancaria 📢
📌 Banco: Mercadopago
💳 Alias: zettaprint.mp

A nombre de Christian Tkaczyk.
✅ Una vez realizada la transferencia, envíanos el comprobante por WhatsApp para confirmar tu pedido.

Dirección de retiro: Estanislao del campo 4055 entre Maza y Cravioto, Quilmes Oeste. (Atras del Jumbo)
`;

document.getElementById("resultado").value = resumen;
}

function copiar(){
let texto = document.getElementById("resultado");
texto.select();
document.execCommand("copy");
alert("Resumen copiado ✅");
}

function resetear(){
document.getElementById("productos").innerHTML="";
agregarProducto();
document.getElementById("resultado").value="";
document.getElementById("fechaEntrega").value="";
document.getElementById("envio").value="No";
}

</script>

</body>
</html>
